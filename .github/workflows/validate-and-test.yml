name: Validate & Test

on:
  push:
    paths:
      - 'prebuilt/**'
      - 'scripts/**'
      - 'prompts/**'
      - 'tools/**'
      - 'bin/**'
      - 'tests/**'
      - 'hooks/**'
      - 'desktop/**'
      - 'package.json'
      - 'skill-catalog.json'
      - 'SKILL.md'
      - 'references/**'
      - 'ETHICS.md'
      - 'requirements.txt'
      - 'README.md'
      - 'README_EN.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'docs/PRD.md'
      - 'docs/v1-framework-roadmap.md'
      - 'masters/**'
      - '.claude-plugin/**'
      - '.cursor-plugin/**'
      - 'gemini-extension.json'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/validate-and-test.yml'
  # No paths: filter on pull_request — the "Validate" and "Fidelity smoke"
  # jobs are branch-protection-required checks, so they must run on EVERY
  # PR. A paths filter would skip them on docs/config-only PRs, leaving the
  # required checks permanently pending and the PR unmergeable without an
  # admin override. The validate job is pure structural validation (~9s, no
  # API calls); running it on every PR is cheap.
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly full fidelity sweep — Mondays 04:00 UTC. Per-PR CI only runs a
    # 1-fixture smoke; this is the only run that grades all 160+ fixtures and
    # catches regressions the smoke rotation would take 15 weeks to surface.
    - cron: '0 4 * * 1'

# Least privilege: this workflow only reads the repo and runs tests. No job
# needs to write contents, issues, or PRs. Pinning it here (rather than relying
# on the repo default) keeps the GITHUB_TOKEN read-only even if the org default
# is later widened.
permissions:
  contents: read

jobs:
  validate:
    name: Validate SKILL.md & fidelity structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        # -r requirements.txt, not a hardcoded list — otherwise dependabot
        # bumps to the version bounds never reach CI.
        run: pip install -r requirements.txt pytest

      - name: Lint SKILL.md frontmatter (includes v0.8 persona-fidelity sub-check)
        run: python scripts/validate.py --strict

      - name: Validate fidelity.jsonl structure
        run: python scripts/validate-fidelity.py

      - name: Validate persona-fidelity schema (v0.8) — explicit
        run: python scripts/validate-persona-fidelity.py

      - name: Validate citation contracts
        run: python scripts/validate-citation-contract.py

      - name: Validate cross_critique schema
        run: python scripts/validate-cross-critique.py

      - name: Check platform manifest version consistency (v0.8 — hard gate)
        run: python scripts/check-manifest-versions.py

      - name: Validate lore_triggers content (v0.8 — hard gate)
        run: python scripts/validate-lore-triggers-content.py --strict

      # Enforces that routing.json keyword sets stay pairwise disjoint. The
      # pairing table this replaced shipped three collisions (戒律, 道次第,
      # 中观/空性), which made a match depend on iteration order.
      - name: Validate routing table (v0.11 — hard gate)
        run: python scripts/validate-routing.py

      - name: Test session-start hook lineage sanitization
        run: bash hooks/tests/test_session_start.sh

      - name: Test run-hook wrapper dispatch (bash + POSIX sh)
        run: bash hooks/tests/test_run_hook.sh

      - name: Run Python tests
        run: python -m pytest tests/ scripts/tests/ -v

      - name: Dry-run fidelity tests
        run: python scripts/test-fidelity.py --all --dry-run

      - name: Run CLI tests
        run: node --test tests/cli.test.mjs

  python-compat:
    name: Generator compatibility (Python 3.9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.9"

      - name: Install generator dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python 3.9 generator smoke
        run: |
          python -m compileall -q tools scripts
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          python tools/sutra_collector.py \
            --offline-smoke --name "Offline Demo" --tradition "南传" \
            --output "$TMP_DIR/collected.json"
          python tools/verify_sources.py --check-links "$TMP_DIR/collected.json"
          python tools/master_builder.py \
            --offline-smoke --output "$TMP_DIR/masters" \
            > "$TMP_DIR/builder.json"
          PERSONA_DIR=$(python -c \
            'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["teacher_dir"])' \
            "$TMP_DIR/builder.json")
          python tools/verify_sources.py --final-check "$PERSONA_DIR"

  # bin/cli.mjs is the one piece of code every npx user executes, and its
  # path handling broke silently on Windows before this fix (URL.pathname
  # gives "/C:/…"). This job is the regression net: the same node:test suite,
  # on a native Windows runner with a CRLF-defaulting git.
  cli-windows:
    name: CLI tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install generator dependencies
        run: python -m pip install -r requirements.txt

      - name: Run CLI tests
        run: node --test tests/cli.test.mjs

      # The Unix job runs the same wrapper through bash and sh; only here can
      # the cmd.exe half execute at all.
      - name: Test run-hook wrapper exit codes (cmd.exe)
        shell: bash
        run: bash hooks/tests/test_run_hook_cmd.sh

  desktop-rust:
    name: Desktop Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install native GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Show Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check desktop formatting
        run: cargo fmt --manifest-path desktop/Cargo.toml -- --check

      - name: Lint desktop app
        run: cargo clippy --locked --manifest-path desktop/Cargo.toml --all-targets -- -D warnings

      - name: Test desktop app
        run: cargo test --locked --manifest-path desktop/Cargo.toml

      - name: Build desktop app
        run: cargo build --locked --manifest-path desktop/Cargo.toml

  fidelity-smoke:
    name: Fidelity smoke (1 master × 1 fixture)
    runs-on: ubuntu-latest
    needs: validate
    # Cost cap: one basic-difficulty question per PR, Sonnet 4.6 pricing
    # with ~10k-token system prompt → under $0.05/PR. Forks have no secret
    # access — treat missing secret as advisory pass so external PRs can land.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt anthropic

      - name: Pick smoke target
        id: pick
        run: |
          # If the PR touches a specific prebuilt master, smoke-test that one.
          # The selector ignores meta-skills and incomplete directories, then
          # rotates over every discovered persona for any invalid changed target.
          BASE="${{ github.base_ref || 'main' }}"
          if ! DIFF_OUTPUT=$(git diff --name-only "origin/${BASE}...HEAD"); then
            echo "::error::git diff failed while selecting the fidelity smoke target."
            exit 1
          fi
          mapfile -t CHANGED_CANDIDATES < <(
            printf '%s\n' "$DIFF_OUTPUT" \
              | sed -nE 's#^prebuilt/([^/]+)/.*#\1#p' \
              | awk '!seen[$0]++'
          )
          SELECTOR_ARGS=()
          for CANDIDATE in "${CHANGED_CANDIDATES[@]}"; do
            SELECTOR_ARGS+=(--changed "$CANDIDATE")
          done
          if ! CHANGED=$(python scripts/select-fidelity-smoke.py \
            --prebuilt prebuilt \
            --day-of-year "$(date +%j)" \
            "${SELECTOR_ARGS[@]}"); then
            echo "::error::Fidelity smoke target selection failed."
            exit 1
          fi
          echo "master=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Smoke target: $CHANGED"

      - name: Run fidelity smoke
        # SMOKE_MASTER is passed through the env, NOT interpolated as
        # ${{ }} directly inside run: — steps.pick.outputs.master derives from
        # PR-controlled filenames (grep 'prebuilt/\K[^/]+' can capture shell
        # metacharacters), and ${{ }} expansion happens before the shell runs,
        # so inlining it is a script-injection sink. Through env it is plain
        # data the shell never re-evaluates.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMOKE_MASTER: ${{ steps.pick.outputs.master }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY not configured — smoke is advisory on this run (expected on forks)."
            echo '{"skipped": true, "reason": "no_api_key"}' > fidelity-smoke.json
            {
              echo "### Fidelity grading skipped"
              echo
              echo "ANTHROPIC_API_KEY is not configured; deterministic validation ran, but model grading did not run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python scripts/test-fidelity.py \
            --master "$SMOKE_MASTER" \
            --max-tests 1 \
            --json > fidelity-smoke.json
          python - <<'PY'
          import json, sys
          with open("fidelity-smoke.json") as f:
              data = json.load(f)
          # --master returns a single-element list
          r = data[0] if isinstance(data, list) else data
          failed = r.get("failed", 0)
          total = r.get("total", 0)
          print(f"Fidelity smoke: {total - failed}/{total} passed for {r.get('master', '?')}")
          sys.exit(1 if failed else 0)
          PY

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fidelity-smoke-${{ github.run_id }}
          path: fidelity-smoke.json
          if-no-files-found: ignore

  fidelity-full:
    name: Fidelity tests — full suite (weekly + manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt anthropic

      - name: Run fidelity tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY not configured — full fidelity sweep is advisory (structural validation in the validate job still gates)."
            echo '{"skipped": true, "reason": "no_api_key"}' > fidelity-results.json
            {
              echo "### Fidelity grading skipped"
              echo
              echo "ANTHROPIC_API_KEY is not configured; deterministic validation ran, but model grading did not run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python scripts/test-fidelity.py --all --json > fidelity-results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fidelity-results
          path: fidelity-results.json
          if-no-files-found: ignore
